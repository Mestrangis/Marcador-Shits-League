<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shits League — Panel</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1a0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marcador">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<style>
:root {
    --bg: #050a05;
    --surface: #0d1a0d;
    --surface2: #132613;
    --border: #1b3a1b;
    --green: #00e676;
    --green-dim: #1b5e20;
    --green-glow: 0 0 12px rgba(0,230,118,.35);
    --red: #ff1744;
    --yellow: #ffd600;
    --white: #f0f0f0;
    --muted: #6a8a6a;
    --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { height: 100%; }
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
}

/* ====== STATUS BAR (siempre visible) ====== */
#statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    flex-shrink: 0;
}
#statusbar .conexion {
    display: flex; align-items: center; gap: 5px;
}
#statusbar .punto {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
}
#statusbar.conectado .punto { background: var(--green); }
#statusbar .status-tiempo { color: var(--yellow); font-weight: 700; }
#statusbar .status-marcador { color: var(--white); font-weight: 700; }
#statusbar .sep { color: var(--muted); margin: 0 6px; }

/* ====== TABS ====== */
#tab-bar {
    display: flex;
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
}
.tab-btn {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: transparent;
    color: var(--muted);
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: all .2s;
    border-radius: 0;
}
.tab-btn.active {
    color: var(--green);
    border-bottom-color: var(--green);
}

.tab-content { display: none; flex: 1; overflow-y: auto; }
.tab-content.active { display: flex; flex-direction: column; }

/* ====== UTILITIES ====== */
button {
    cursor: pointer; border: none; border-radius: var(--radius);
    font-weight: 700; font-family: inherit;
    transition: transform .1s, opacity .15s;
    -webkit-tap-highlight-color: transparent;
}
button:active { transform: scale(.96); }

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin: 10px 12px 0;
}
.card-title {
    font-size: 10px; font-weight: 800;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
}

input[type="number"] {
    width: 58px; padding: 8px 4px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--surface2); color: var(--white);
    font-size: 15px; font-weight: 700; text-align: center; font-family: inherit;
}
input[type="number"]:focus { outline: 1px solid var(--green); }

input[type="range"] { accent-color: var(--green); height: 6px; flex: 1; }

.radio-group { display: flex; gap: 16px; margin-bottom: 10px; }
.radio-group label {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; color: var(--white); font-size: 14px; font-weight: 600;
}
input[type="radio"] { accent-color: var(--green); width: 16px; height: 16px; }

/* ============================================
   PESTAÑA: PARTIDO
   ============================================ */

/* --- Reloj grande --- */
.partido-crono {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 10px;
    gap: 8px;
}
#partido-tiempo {
    font-size: 56px;
    font-weight: 900;
    color: var(--yellow);
    letter-spacing: 2px;
    line-height: 1;
}
#btn-toggle-crono {
    width: 100%;
    max-width: 280px;
    padding: 14px;
    font-size: 18px;
    background: var(--green);
    color: #000;
    border-radius: 50px;
    letter-spacing: 1px;
}
#btn-toggle-crono.corriendo {
    background: var(--yellow);
    color: #000;
}

/* --- Marcador grande --- */
.partido-marcador {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 6px 12px 12px;
}
.partido-gol {
    font-size: 72px;
    font-weight: 900;
    color: var(--white);
    min-width: 60px;
    text-align: center;
    line-height: 1;
}
.partido-sep {
    font-size: 40px;
    color: var(--muted);
    font-weight: 300;
}

/* --- Botones GOL grandes --- */
.partido-goles {
    display: flex;
    gap: 10px;
    padding: 4px 12px 0;
}
.btn-gol-grande {
    flex: 1;
    padding: 22px 10px;
    font-size: 17px;
    letter-spacing: .5px;
    border-radius: 14px;
    text-align: center;
    min-height: 70px;
}
.btn-gol-grande.local {
    background: linear-gradient(135deg, var(--green-dim), #0a3a0a);
    color: var(--green);
    border: 2px solid var(--green);
    box-shadow: var(--green-glow);
}
.btn-gol-grande.visitante {
    background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
    color: var(--white);
    border: 2px solid #555;
}

/* --- Acciones secundarias --- */
.partido-secundario {
    display: flex;
    gap: 6px;
    padding: 10px 12px 16px;
    flex-wrap: wrap;
    justify-content: center;
}
.btn-sec {
    padding: 10px 12px;
    font-size: 12px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    flex: 1;
    min-width: 70px;
    text-align: center;
}
.btn-sec.danger { color: var(--red); border-color: rgba(255,23,68,.3); }

/* ============================================
   PESTAÑA: PREPARACIÓN
   ============================================ */
#tab-preparacion {
    padding-bottom: 20px;
}
#tab-preparacion .card:first-child { margin-top: 12px; }

.btn-abrir-overlay {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    background: linear-gradient(135deg, var(--green-dim), #0a3a0a);
    color: var(--green);
    border: 1px solid var(--green);
    letter-spacing: 1px;
}

.btn-gestion {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    background: var(--surface2);
    color: var(--white);
    border: 1px solid var(--border);
    letter-spacing: .5px;
}

.fila { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.fila label { font-size: 13px; color: var(--muted); font-weight: 600; }

.btn-aplicar {
    width: 100%; margin-top: 10px; padding: 12px;
    font-size: 14px; background: var(--green-dim); color: var(--green);
    border: 1px solid var(--green);
}

.controles-reloj { display: flex; gap: 8px; justify-content: center; }
.controles-reloj button { font-size: 20px; width: 60px; height: 48px; border-radius: 8px; }
.btn-play { background: var(--green); color: #000; }
.btn-pause { background: var(--yellow); color: #000; }
.btn-reset { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

.slider-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.slider-row label { font-size: 12px; color: var(--muted); min-width: 60px; text-align: right; font-weight: 600; }
.slider-row .slider-val { font-size: 12px; color: var(--green); min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }

.btn-restablecer {
    width: 100%; margin-top: 8px; padding: 10px;
    font-size: 13px; background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
}

/* ====== MODAL GESTIÓN EQUIPOS ====== */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.85); z-index: 1000;
    justify-content: center; align-items: center;
}
.modal-overlay.visible { display: flex; }
.modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; width: 92%; max-width: 850px;
    max-height: 90vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 14px; color: var(--green); font-size: 16px; letter-spacing: .5px; }
.modal-listas { display: flex; gap: 8px; }
.modal-lista { flex: 1; min-width: 0; }
.modal-lista h4 { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; letter-spacing: 1px; font-weight: 800; }
.modal-lista ul { list-style: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; min-height: 100px; max-height: 240px; overflow-y: auto; padding: 4px; }
.modal-lista ul.drag-over { outline: 2px dashed var(--green); outline-offset: -2px; }
.modal-lista li { padding: 10px 12px; cursor: pointer; border-radius: 6px; font-size: 14px; font-weight: 600; user-select: none; -webkit-user-select: none; min-height: 42px; display: flex; align-items: center; }
.modal-lista li:hover { background: rgba(0,230,118,.08); }
.modal-lista li.selected { background: var(--green-dim); color: var(--green); }
.modal-lista li.dragging { opacity: .4; }
.modal-acciones { display: flex; flex-direction: column; gap: 6px; justify-content: center; min-width: 100px; }
.modal-acciones button { font-size: 12px; padding: 10px 6px; background: var(--surface2); color: var(--white); border: 1px solid var(--border); border-radius: 8px; min-height: 42px; }
.modal-footer { display: flex; gap: 8px; margin-top: 14px; }
.btn-nuevo-jugador { flex: 1; padding: 12px; background: var(--green-dim); color: var(--green); border: 1px solid var(--green); font-size: 13px; }
.btn-cerrar-modal { flex: 1; padding: 12px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); font-size: 13px; }

@media (max-width: 600px) {
    .modal-listas { flex-direction: column; }
    .modal-acciones { flex-direction: row; flex-wrap: wrap; min-width: 0; }
    .modal-acciones button { flex: 1; min-width: 70px; }
    .modal-lista ul { min-height: 70px; max-height: 160px; }
}

/* ====== MODAL SELECTOR GOL ====== */
.selector-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.92); z-index: 1001;
    justify-content: center; align-items: flex-end;
}
.selector-overlay.visible { display: flex; }
.selector {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px 18px 0 0; padding: 24px 16px 28px;
    width: 100%; max-width: 500px;
    max-height: 85vh; overflow-y: auto;
    animation: slideUp .25s ease-out;
}
@keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
.selector h3 {
    text-align: center; margin-bottom: 18px;
    color: var(--white); font-size: 20px; font-weight: 800;
}
.selector-jugadores {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px; margin-bottom: 16px;
}
.selector-jugadores button {
    height: 56px; font-size: 14px; border-radius: 12px;
    font-weight: 700;
}
.btn-jugador-local { background: var(--green-dim); color: var(--green); border: 2px solid var(--green); }
.btn-jugador-visitante { background: #1a1a1a; color: var(--white); border: 2px solid #555; }
.btn-jugador-sin { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-jugador-otro {
    background: transparent; color: var(--muted);
    border: 2px dashed var(--border); font-size: 13px;
}
.btn-cancelar-selector {
    width: 100%; padding: 16px; font-size: 15px;
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border); border-radius: 12px;
}
/* ====== INSTALL BANNER ====== */
#install-banner {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
    background: var(--surface); border-top: 1px solid var(--green);
    padding: 12px 16px;
    align-items: center; gap: 12px;
    animation: slideUp .3s ease-out;
}
#install-banner.visible { display: flex; }
#install-banner .msg { flex: 1; font-size: 13px; color: var(--white); line-height: 1.4; }
#install-banner .msg b { color: var(--green); }
#install-banner .btn-install {
    padding: 10px 20px; font-size: 13px;
    background: var(--green); color: #000; border-radius: 8px; white-space: nowrap;
}
#install-banner .btn-dismiss {
    padding: 6px; font-size: 18px; background: transparent; color: var(--muted);
    line-height: 1; border-radius: 4px;
}
</style>
</head>
<body>

<!-- ====== STATUS BAR ====== -->
<div id="statusbar">
    <div class="conexion">
        <span class="punto"></span>
        <span id="monitor-tiempo" class="status-tiempo">00:00</span>
    </div>
    <div>
        <span id="monitor-marcador" class="status-marcador">0 - 0</span>
    </div>
</div>

<!-- ====== TABS ====== -->
<div id="tab-bar">
    <button class="tab-btn active" data-tab="partido">&#9917; Partido</button>
    <button class="tab-btn" data-tab="preparacion">&#9881; Preparaci&oacute;n</button>
</div>

<!-- ====== PARTIDO ====== -->
<div id="tab-partido" class="tab-content active">
    <div class="partido-crono">
        <div id="partido-tiempo">00:00</div>
        <button id="btn-toggle-crono">&#9654; REANUDAR</button>
    </div>

    <div class="partido-marcador">
        <span id="partido-goles-local" class="partido-gol">0</span>
        <span class="partido-sep">&mdash;</span>
        <span id="partido-goles-visitante" class="partido-gol">0</span>
    </div>

    <div class="partido-goles">
        <button class="btn-gol-grande local" id="btn-gol-local">&#9917; GOL LOCAL</button>
        <button class="btn-gol-grande visitante" id="btn-gol-visitante">&#9917; GOL VISITANTE</button>
    </div>

    <div class="partido-secundario">
        <button class="btn-sec" id="btn-undo-local">&#8617; Local</button>
        <button class="btn-sec" id="btn-undo-visitante">&#8617; Visit.</button>
        <button class="btn-sec" id="btn-toggle-color">&#9632; Color</button>
        <button class="btn-sec danger" id="btn-stop-video">&#9209; Video</button>
    </div>
</div>

<!-- ====== PREPARACIÓN ====== -->
<div id="tab-preparacion" class="tab-content">
    <div class="card">
        <button class="btn-abrir-overlay" id="btn-abrir-overlay">&#x1F4FA; ABRIR OVERLAY</button>
    </div>

    <div class="card">
        <div class="card-title">Equipos y jugadores</div>
        <button class="btn-gestion" id="btn-gestionar">&#9881; Gestionar Verde / Negro</button>
    </div>

    <div class="card">
        <div class="card-title">Configuraci&oacute;n de tiempo</div>
        <div class="radio-group">
            <label><input type="radio" name="modo" value="asc" checked> Ascendente</label>
            <label><input type="radio" name="modo" value="desc"> Descendente</label>
        </div>
        <div class="fila">
            <label>Inicio:</label>
            <input type="number" id="spin-inicio" min="0" max="90" value="0">
            <label>Fin:</label>
            <input type="number" id="spin-fin" min="0" max="90" value="45">
            <label>Parte:</label>
            <input type="number" id="spin-parte" min="1" max="4" value="1">
        </div>
        <button class="btn-aplicar" id="btn-aplicar">Aplicar Tiempo</button>
        <div class="controles-reloj" style="margin-top:12px">
            <button class="btn-play" id="btn-play">&#9654;</button>
            <button class="btn-pause" id="btn-pause">&#9208;</button>
            <button class="btn-reset" id="btn-reset-reloj">&#9209;</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Color del marcador</div>
        <div class="radio-group">
            <label><input type="radio" name="color-marcador" value="white" checked> Blanco</label>
            <label><input type="radio" name="color-marcador" value="black"> Negro</label>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Configuraci&oacute;n de pantalla (0 = auto)</div>
        <div class="slider-row"><label>Ancho:</label><input type="range" id="pantalla-w" min="0" max="3840" value="0"><span class="slider-val" id="pantalla-w-val">0</span></div>
        <div class="slider-row"><label>Alto:</label><input type="range" id="pantalla-h" min="0" max="2160" value="0"><span class="slider-val" id="pantalla-h-val">0</span></div>
        <div class="slider-row"><label>Offset X:</label><input type="range" id="pantalla-ox" min="0" max="1920" value="0"><span class="slider-val" id="pantalla-ox-val">0</span></div>
        <div class="slider-row"><label>Offset Y:</label><input type="range" id="pantalla-oy" min="0" max="1080" value="0"><span class="slider-val" id="pantalla-oy-val">0</span></div>
        <button class="btn-restablecer" id="btn-restablecer-pantalla">Restablecer</button>
    </div>

    <div class="card">
        <div class="card-title">Marcador</div>
        <div style="display:flex;gap:10px;justify-content:center">
            <button class="btn-sec danger" id="btn-reset-goles" style="flex:1">Reset 0-0</button>
        </div>
    </div>
</div>

<!-- ====== MODALS ====== -->
<div class="modal-overlay" id="modal-gestion">
    <div class="modal">
        <h3>Gesti&oacute;n de Equipos</h3>
        <div class="modal-listas">
            <div class="modal-lista"><h4>Sin Asignar</h4><ul id="lista-sin-asignar" data-equipo="SIN_ASIGNAR"></ul></div>
            <div class="modal-acciones">
                <button id="btn-a-verde">&#10145; Verde</button>
                <button id="btn-a-negro">&#10145; Negro</button>
                <button id="btn-quitar">&#11013; Quitar</button>
            </div>
            <div class="modal-lista"><h4>Verde (Local)</h4><ul id="lista-local" data-equipo="LOCAL"></ul></div>
            <div class="modal-lista"><h4>Negro (Visitante)</h4><ul id="lista-visitante" data-equipo="VISITANTE"></ul></div>
        </div>
        <div class="modal-footer">
            <button class="btn-nuevo-jugador" id="btn-nuevo-jugador">&#10133; Nuevo Jugador</button>
            <button class="btn-cerrar-modal" id="btn-cerrar-gestion">Cerrar</button>
        </div>
    </div>
</div>

<div class="selector-overlay" id="modal-selector">
    <div class="selector">
        <h3 id="selector-titulo">&#191;Qui&eacute;n marc&oacute;?</h3>
        <div class="selector-jugadores" id="selector-jugadores"></div>
        <button class="btn-cancelar-selector" id="btn-cancelar-selector">Cancelar</button>
    </div>
</div>

<script type="module">
import { publicarEstado, leerEstado, onEstadoActualizado, publicarComandoCrono, onComandoCrono, onConexionCambiada, onSolicitudEstado, solicitarEstado } from './sync.js';

// ============================================================
//  TABS
// ============================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
});

// ============================================================
//  ABRIR OVERLAY
// ============================================================
document.getElementById('btn-abrir-overlay').addEventListener('click', () => {
    window.open('overlay.html', 'overlay', 'noopener');
});

// ============================================================
//  CONFIGURACIÓN DE PANTALLA
// ============================================================
let pantallaConfig = { offsetX: 0, offsetY: 0, ancho: 0, alto: 0 };
const sliderIds = ['pantalla-w', 'pantalla-h', 'pantalla-ox', 'pantalla-oy'];
const sliderKeys = ['ancho', 'alto', 'offsetX', 'offsetY'];

sliderIds.forEach((id, i) => {
    const slider = document.getElementById(id);
    const valSpan = document.getElementById(id + '-val');
    slider.addEventListener('input', () => {
        const v = Number(slider.value);
        valSpan.textContent = v;
        pantallaConfig[sliderKeys[i]] = v;
        publicarEstadoCompleto();
    });
});

document.getElementById('btn-restablecer-pantalla').addEventListener('click', () => {
    pantallaConfig = { offsetX: 0, offsetY: 0, ancho: 0, alto: 0 };
    sliderIds.forEach(id => { document.getElementById(id).value = 0; document.getElementById(id + '-val').textContent = '0'; });
    publicarEstadoCompleto();
});

// ============================================================
//  DATOS DE JUGADORES
// ============================================================
const VIDEO_DEFAULT_LOCAL = 'assets/videos/default.mp4';
let jugadoresBase = [];
let jugadoresDinamicos = [];
let jugadores = [];
let videoCelebracionDefault = VIDEO_DEFAULT_LOCAL;

async function cargarJugadores() {
    try {
        const resp = await fetch('jugadores.json');
        const data = await resp.json();
        videoCelebracionDefault = data.videoCelebracionDefault || VIDEO_DEFAULT_LOCAL;
        jugadoresBase = data.jugadores.map(j => ({
            nombreCorto: j.nombreCorto, nombreCompleto: j.nombreCompleto,
            equipo: j.equipo || 'SIN_ASIGNAR', videoCelebracion: j.videoCelebracion || null
        }));
    } catch (e) { console.error('Error cargando jugadores.json:', e); }
    reconstruirJugadores();
}

function reconstruirJugadores(asignaciones) {
    jugadores = [...jugadoresBase.map(j => ({ ...j })), ...jugadoresDinamicos.map(j => ({ ...j }))];
    if (asignaciones) jugadores.forEach(j => { if (asignaciones[j.nombreCorto] !== undefined) j.equipo = asignaciones[j.nombreCorto]; });
}

function getAsignaciones() {
    const map = {};
    jugadores.forEach(j => { map[j.nombreCorto] = j.equipo; });
    return map;
}

// ============================================================
//  ESTADO DEL PARTIDO
// ============================================================
let golesLocal = 0;
let golesVisitante = 0;
let registroGolesLocal = {};
let registroGolesVisitante = {};
let historialLocal = [];
let historialVisitante = [];
let ordenDisplayLocal = [];
let ordenDisplayVisitante = [];
let colorMarcador = 'white';

// ============================================================
//  CRONÓMETRO (basado en comandos)
// ============================================================
let comandoCrono = null;
let displayInterval = null;

function leerConfig() {
    return {
        esAscendente: document.querySelector('input[name="modo"]:checked').value === 'asc',
        limiteMinutos: document.getElementById('spin-fin').valueAsNumber || 45,
        minutoInicioRef: document.getElementById('spin-inicio').valueAsNumber || 0,
        duracionParte: Math.abs((document.getElementById('spin-fin').valueAsNumber || 45) - (document.getElementById('spin-inicio').valueAsNumber || 0)) || 45,
        parteActual: document.getElementById('spin-parte').valueAsNumber || 1
    };
}

function calcularSegundos() {
    if (!comandoCrono) return 0;
    if (comandoCrono.accion === 'arrancar') {
        const elapsed = (Date.now() - comandoCrono.tsReferencia) / 1000;
        const c = comandoCrono.config;
        if (c.esAscendente) return Math.min(Math.floor(comandoCrono.segundosEnPausa + elapsed), c.limiteMinutos * 60);
        else return Math.max(Math.floor(comandoCrono.segundosEnPausa - elapsed), 0);
    }
    return comandoCrono.segundosEnPausa || 0;
}

function cronoCorriendo() { return comandoCrono && comandoCrono.accion === 'arrancar'; }

function formatoTiempo(segs) {
    const m = Math.floor(segs / 60); const s = segs % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function refrescarDisplayReloj() {
    const t = formatoTiempo(calcularSegundos());
    document.getElementById('monitor-tiempo').textContent = t;
    document.getElementById('partido-tiempo').textContent = t;
}

function actualizarBotonCrono() {
    const btn = document.getElementById('btn-toggle-crono');
    if (cronoCorriendo()) {
        btn.innerHTML = '&#9208; PAUSAR';
        btn.classList.add('corriendo');
    } else {
        btn.innerHTML = '&#9654; REANUDAR';
        btn.classList.remove('corriendo');
    }
}

function iniciarDisplayLocal() {
    if (displayInterval) clearInterval(displayInterval);
    displayInterval = null;
    refrescarDisplayReloj();
    actualizarBotonCrono();
    if (cronoCorriendo()) displayInterval = setInterval(refrescarDisplayReloj, 1000);
}

function enviarComando(accion, segundosEnPausa, configOverride) {
    const config = configOverride || (comandoCrono ? comandoCrono.config : leerConfig());
    comandoCrono = { accion, tsReferencia: Date.now(), segundosEnPausa, config };
    iniciarDisplayLocal();
    if (bootstrapCompleto) { publicarComandoCrono(comandoCrono); publicarEstadoCompleto(); }
}

function aplicarComandoCronoLocal(cmd) {
    if (!cmd) return;
    comandoCrono = cmd;
    const c = cmd.config;
    document.getElementById('spin-inicio').value = c.minutoInicioRef || 0;
    document.getElementById('spin-fin').value = c.limiteMinutos || 45;
    document.getElementById('spin-parte').value = c.parteActual || 1;
    const modoRadio = document.querySelector(`input[name="modo"][value="${c.esAscendente ? 'asc' : 'desc'}"]`);
    if (modoRadio) modoRadio.checked = true;
    iniciarDisplayLocal();
}

onComandoCrono(aplicarComandoCronoLocal);

// Botones crono PREPARACIÓN
document.getElementById('btn-play').addEventListener('click', () => { if (!cronoCorriendo()) enviarComando('arrancar', calcularSegundos()); });
document.getElementById('btn-pause').addEventListener('click', () => { if (cronoCorriendo()) enviarComando('parar', calcularSegundos()); });
document.getElementById('btn-reset-reloj').addEventListener('click', () => { const config = comandoCrono ? comandoCrono.config : leerConfig(); enviarComando('resetear', config.minutoInicioRef * 60, config); });
document.getElementById('btn-aplicar').addEventListener('click', () => { const config = leerConfig(); enviarComando('configurar', config.minutoInicioRef * 60, config); });

// Botón toggle crono PARTIDO
document.getElementById('btn-toggle-crono').addEventListener('click', () => {
    if (cronoCorriendo()) enviarComando('parar', calcularSegundos());
    else enviarComando('arrancar', calcularSegundos());
});

// ============================================================
//  MONITORES
// ============================================================
function actualizarMonitorMarcador() {
    document.getElementById('monitor-marcador').textContent = golesLocal + ' - ' + golesVisitante;
    document.getElementById('partido-goles-local').textContent = golesLocal;
    document.getElementById('partido-goles-visitante').textContent = golesVisitante;
}

// ============================================================
//  PUBLICAR ESTADO
// ============================================================
let aplicandoRemoto = false;
let bootstrapCompleto = false;
let resolverBootstrap = null;

function publicarEstadoCompleto(videoEvento) {
    if (aplicandoRemoto || !bootstrapCompleto) return;
    const config = comandoCrono ? comandoCrono.config : leerConfig();
    const estado = {
        golesLocal, golesVisitante,
        parte: config.parteActual + 'ª PARTE', colorMarcador,
        goleadoresLocal: ordenDisplayLocal.map(n => ({ nombre: n, minutos: registroGolesLocal[n] || [] })),
        goleadoresVisitante: ordenDisplayVisitante.map(n => ({ nombre: n, minutos: registroGolesVisitante[n] || [] })),
        comandoCrono, jugadoresDinamicos, asignaciones: getAsignaciones(),
        _panel: { golesLocal, golesVisitante, registroGolesLocal, registroGolesVisitante, historialLocal, historialVisitante, ordenDisplayLocal, ordenDisplayVisitante, colorMarcador }
    };
    if (videoEvento !== undefined) estado.videoEvento = videoEvento;
    estado.pantalla = pantallaConfig;
    const urls = new Set();
    if (videoCelebracionDefault) urls.add(videoCelebracionDefault);
    jugadores.forEach(j => { if (j.videoCelebracion) urls.add(j.videoCelebracion); });
    estado.videosPrecargar = [...urls];
    publicarEstado(estado);
}

// ============================================================
//  SINCRONIZACIÓN BIDIRECCIONAL
// ============================================================
function aplicarEstadoRemoto(estado) {
    if (!estado) return;
    aplicandoRemoto = true;

    if (estado._panel) {
        const p = estado._panel;
        golesLocal = p.golesLocal; golesVisitante = p.golesVisitante;
        registroGolesLocal = p.registroGolesLocal || {}; registroGolesVisitante = p.registroGolesVisitante || {};
        historialLocal = p.historialLocal || []; historialVisitante = p.historialVisitante || [];
        ordenDisplayLocal = p.ordenDisplayLocal || []; ordenDisplayVisitante = p.ordenDisplayVisitante || [];
        colorMarcador = p.colorMarcador || 'white';
        const colorRadio = document.querySelector(`input[name="color-marcador"][value="${colorMarcador}"]`);
        if (colorRadio) colorRadio.checked = true;
    }

    if (estado.comandoCrono) aplicarComandoCronoLocal(estado.comandoCrono);
    if (estado.jugadoresDinamicos) jugadoresDinamicos = estado.jugadoresDinamicos;
    if (estado.asignaciones) reconstruirJugadores(estado.asignaciones);

    if (estado.pantalla) {
        pantallaConfig = estado.pantalla;
        sliderIds.forEach((id, i) => { const v = pantallaConfig[sliderKeys[i]] || 0; document.getElementById(id).value = v; document.getElementById(id + '-val').textContent = v; });
    }

    actualizarMonitorMarcador();

    if (modalGestion.classList.contains('visible')) { seleccionados.clear(); refrescarListasGestion(); }

    aplicandoRemoto = false;
    if (resolverBootstrap) resolverBootstrap();
}

onEstadoActualizado(aplicarEstadoRemoto);

// ============================================================
//  COLOR DEL MARCADOR
// ============================================================
document.querySelectorAll('input[name="color-marcador"]').forEach(radio => {
    radio.addEventListener('change', () => { colorMarcador = radio.value; publicarEstadoCompleto(); });
});
document.getElementById('btn-toggle-color').addEventListener('click', () => {
    colorMarcador = colorMarcador === 'white' ? 'black' : 'white';
    const radio = document.querySelector(`input[name="color-marcador"][value="${colorMarcador}"]`);
    if (radio) radio.checked = true;
    publicarEstadoCompleto();
});

// ============================================================
//  LÓGICA DE GOLES
// ============================================================
function obtenerMinutoCalculado() {
    const segs = calcularSegundos();
    const config = comandoCrono ? comandoCrono.config : leerConfig();
    const minutoReloj = Math.floor(segs / 60);
    const jugados = config.esAscendente ? (minutoReloj - config.minutoInicioRef) : (config.minutoInicioRef - minutoReloj);
    return Math.max(0, ((config.parteActual - 1) * config.duracionParte) + jugados);
}

function agregarGol(esLocal, jugador) {
    let nombreMostrar = jugador.nombreCorto;
    if (esLocal && jugador.equipo === 'VISITANTE') nombreMostrar += ' (PP)';
    else if (!esLocal && jugador.equipo === 'LOCAL') nombreMostrar += ' (PP)';

    const minuto = obtenerMinutoCalculado() + "'";
    const registro = esLocal ? registroGolesLocal : registroGolesVisitante;
    const historial = esLocal ? historialLocal : historialVisitante;
    const orden = esLocal ? ordenDisplayLocal : ordenDisplayVisitante;

    if (!registro[nombreMostrar]) registro[nombreMostrar] = [];
    registro[nombreMostrar].push(minuto);
    historial.push(nombreMostrar);
    const idx = orden.indexOf(nombreMostrar);
    if (idx !== -1) orden.splice(idx, 1);
    orden.push(nombreMostrar);

    if (esLocal) golesLocal++; else golesVisitante++;
    actualizarMonitorMarcador();

    const videoUrl = jugador.videoCelebracion || videoCelebracionDefault;
    publicarEstadoCompleto(videoUrl ? { url: videoUrl, ts: Date.now() } : undefined);
}

function deshacerGol(esLocal) {
    const registro = esLocal ? registroGolesLocal : registroGolesVisitante;
    const historial = esLocal ? historialLocal : historialVisitante;
    const orden = esLocal ? ordenDisplayLocal : ordenDisplayVisitante;

    if (esLocal ? golesLocal <= 0 : golesVisitante <= 0) return;
    if (historial.length === 0) return;
    const nombre = historial.pop();

    if (registro[nombre] && registro[nombre].length > 0) registro[nombre].pop();
    const idx = orden.indexOf(nombre);
    if (idx !== -1) orden.splice(idx, 1);
    if (registro[nombre] && registro[nombre].length > 0) { orden.push(nombre); }
    else { delete registro[nombre]; }

    if (esLocal) golesLocal--; else golesVisitante--;
    actualizarMonitorMarcador();
    publicarEstadoCompleto();
}

function resetGoles() {
    golesLocal = 0; golesVisitante = 0;
    registroGolesLocal = {}; registroGolesVisitante = {};
    historialLocal = []; historialVisitante = [];
    ordenDisplayLocal = []; ordenDisplayVisitante = [];
    actualizarMonitorMarcador();
    publicarEstadoCompleto();
}

document.getElementById('btn-undo-local').addEventListener('click', () => deshacerGol(true));
document.getElementById('btn-undo-visitante').addEventListener('click', () => deshacerGol(false));
document.getElementById('btn-reset-goles').addEventListener('click', resetGoles);

// ============================================================
//  SELECTOR DE GOLEADOR (modal "¿Quién marcó?")
// ============================================================
let selectorEsLocal = true;
const modalSelector = document.getElementById('modal-selector');
const selectorJugadores = document.getElementById('selector-jugadores');

function abrirSelector(esLocal) {
    selectorEsLocal = esLocal;
    selectorJugadores.innerHTML = '';

    const equipoFiltro = esLocal ? 'LOCAL' : 'VISITANTE';
    const equipoJugadores = jugadores.filter(j => j.equipo === equipoFiltro);
    const otrosJugadores = jugadores.filter(j => j.equipo !== equipoFiltro);

    equipoJugadores.forEach(j => {
        const btn = document.createElement('button');
        btn.textContent = j.nombreCorto;
        btn.className = esLocal ? 'btn-jugador-local' : 'btn-jugador-visitante';
        btn.addEventListener('click', () => { agregarGol(selectorEsLocal, j); modalSelector.classList.remove('visible'); });
        selectorJugadores.appendChild(btn);
    });

    if (otrosJugadores.length > 0) {
        otrosJugadores.forEach(j => {
            const btn = document.createElement('button');
            btn.textContent = j.nombreCorto;
            btn.className = j.equipo === 'LOCAL' ? 'btn-jugador-local' : j.equipo === 'VISITANTE' ? 'btn-jugador-visitante' : 'btn-jugador-sin';
            btn.addEventListener('click', () => { agregarGol(selectorEsLocal, j); modalSelector.classList.remove('visible'); });
            selectorJugadores.appendChild(btn);
        });
    }

    const btnOtro = document.createElement('button');
    btnOtro.textContent = '+ Otro';
    btnOtro.className = 'btn-jugador-otro';
    btnOtro.addEventListener('click', () => {
        const nombre = prompt('Nombre del jugador:');
        if (nombre && nombre.trim()) {
            const temp = { nombreCorto: nombre.trim().toUpperCase(), nombreCompleto: nombre.trim(), equipo: 'SIN_ASIGNAR', videoCelebracion: null };
            agregarGol(selectorEsLocal, temp);
            modalSelector.classList.remove('visible');
        }
    });
    selectorJugadores.appendChild(btnOtro);

    modalSelector.classList.add('visible');
}

document.getElementById('btn-gol-local').addEventListener('click', () => abrirSelector(true));
document.getElementById('btn-gol-visitante').addEventListener('click', () => abrirSelector(false));
document.getElementById('btn-cancelar-selector').addEventListener('click', () => modalSelector.classList.remove('visible'));

// ============================================================
//  VIDEO
// ============================================================
document.getElementById('btn-stop-video').addEventListener('click', () => {
    publicarEstadoCompleto({ url: null, ts: Date.now() });
});

// ============================================================
//  GESTIÓN DE EQUIPOS
// ============================================================
const modalGestion = document.getElementById('modal-gestion');
const seleccionados = new Set();
const dropZones = document.querySelectorAll('.modal-lista ul[data-equipo]');

function refrescarListasGestion() {
    const sinAsignar = document.getElementById('lista-sin-asignar');
    const listaLocal = document.getElementById('lista-local');
    const listaVisitante = document.getElementById('lista-visitante');
    sinAsignar.innerHTML = ''; listaLocal.innerHTML = ''; listaVisitante.innerHTML = '';

    jugadores.forEach((j, idx) => {
        const li = document.createElement('li');
        li.textContent = j.nombreCorto;
        li.draggable = true; li.dataset.idx = idx;
        if (seleccionados.has(j)) li.classList.add('selected');
        li.addEventListener('click', () => { if (seleccionados.has(j)) { seleccionados.delete(j); li.classList.remove('selected'); } else { seleccionados.add(j); li.classList.add('selected'); } });
        li.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', String(idx)); e.dataTransfer.effectAllowed = 'move'; li.classList.add('dragging'); });
        li.addEventListener('dragend', () => li.classList.remove('dragging'));
        if (j.equipo === 'LOCAL') listaLocal.appendChild(li);
        else if (j.equipo === 'VISITANTE') listaVisitante.appendChild(li);
        else sinAsignar.appendChild(li);
    });
}

dropZones.forEach(ul => {
    ul.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; ul.classList.add('drag-over'); });
    ul.addEventListener('dragleave', () => ul.classList.remove('drag-over'));
    ul.addEventListener('drop', (e) => {
        e.preventDefault(); ul.classList.remove('drag-over');
        const destino = ul.dataset.equipo;
        const j = jugadores[Number(e.dataTransfer.getData('text/plain'))];
        if (!j) return;
        if (seleccionados.has(j) && seleccionados.size > 1) seleccionados.forEach(p => { p.equipo = destino; });
        else j.equipo = destino;
        seleccionados.clear(); refrescarListasGestion();
        publicarEstadoCompleto();
    });
});

function moverSeleccionados(destino) {
    if (seleccionados.size === 0) return;
    seleccionados.forEach(j => { j.equipo = destino; });
    seleccionados.clear(); refrescarListasGestion();
    publicarEstadoCompleto();
}

document.getElementById('btn-gestionar').addEventListener('click', () => { seleccionados.clear(); refrescarListasGestion(); modalGestion.classList.add('visible'); });
document.getElementById('btn-cerrar-gestion').addEventListener('click', () => modalGestion.classList.remove('visible'));
document.getElementById('btn-a-verde').addEventListener('click', () => moverSeleccionados('LOCAL'));
document.getElementById('btn-a-negro').addEventListener('click', () => moverSeleccionados('VISITANTE'));
document.getElementById('btn-quitar').addEventListener('click', () => moverSeleccionados('SIN_ASIGNAR'));

document.getElementById('btn-nuevo-jugador').addEventListener('click', () => {
    const nombre = prompt('Nombre del nuevo jugador:', 'Invitado');
    if (nombre && nombre.trim()) {
        const videoUrl = prompt('URL de vídeo de celebración (dejar vacío para usar el por defecto):', '');
        jugadoresDinamicos.push({ nombreCorto: nombre.trim().toUpperCase(), nombreCompleto: nombre.trim(), equipo: 'SIN_ASIGNAR', videoCelebracion: (videoUrl && videoUrl.trim()) ? videoUrl.trim() : null });
        reconstruirJugadores(); refrescarListasGestion();
        publicarEstadoCompleto();
    }
});

// ============================================================
//  INDICADOR DE CONEXIÓN
// ============================================================
const statusbar = document.getElementById('statusbar');

onConexionCambiada((st) => {
    if (st === 'connected') { statusbar.classList.add('conectado'); solicitarEstado(); }
    else { statusbar.classList.remove('conectado'); }
});

onSolicitudEstado(() => publicarEstadoCompleto());

// ============================================================
//  INICIO (bootstrap)
// ============================================================
async function iniciar() {
    await cargarJugadores();

    const estadoLocal = leerEstado();
    if (estadoLocal) aplicarEstadoRemoto(estadoLocal);

    await new Promise(resolve => {
        let resuelto = false;
        resolverBootstrap = () => { if (!resuelto) { resuelto = true; resolve(); } };
        setTimeout(resolverBootstrap, 2000);
    });
    resolverBootstrap = null;

    bootstrapCompleto = true;

    if (!comandoCrono && !estadoLocal) enviarComando('configurar', 0, leerConfig());
    else publicarEstadoCompleto();
}

iniciar();
</script>

<div id="install-banner">
    <div class="msg"></div>
    <button class="btn-install" id="btn-install">Instalar</button>
    <button class="btn-dismiss" id="btn-dismiss-install">&times;</button>
</div>

<script>
// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// Install prompt (Android/Chrome)
let deferredPrompt = null;
const banner = document.getElementById('install-banner');
const bannerMsg = banner.querySelector('.msg');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    bannerMsg.innerHTML = '<b>Marcador F&uacute;tbol</b> se puede instalar como app';
    banner.classList.add('visible');
});

document.getElementById('btn-install').addEventListener('click', () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; banner.classList.remove('visible'); });
    }
});

document.getElementById('btn-dismiss-install').addEventListener('click', () => {
    banner.classList.remove('visible');
});

// iOS hint (no beforeinstallprompt)
if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !navigator.standalone) {
    if (!window.matchMedia('(display-mode: standalone)').matches) {
        bannerMsg.innerHTML = 'Para instalar: pulsa <b>Compartir</b> &#x2934; y luego <b>A&ntilde;adir a pantalla de inicio</b>';
        banner.querySelector('.btn-install').style.display = 'none';
        banner.classList.add('visible');
    }
}
</script>
