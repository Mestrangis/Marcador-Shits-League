<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcador Público</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    background: #000;
    overflow: hidden;
    width: 100%;
    height: 100%;
}

/* --- FONDO: capa independiente, object-fit cover sobre la zona segura --- */
#fondo-cover {
    position: absolute;
    background: url('assets/images/fondo.png') center / cover no-repeat;
}

/* --- LIENZO UI: 1920x1080, escala uniforme, centrado --- */
#lienzo {
    width: 1920px;
    height: 1080px;
    position: absolute;
    transform-origin: 0 0;
    overflow: hidden;
}

/* --- CRONÓMETRO --- */
#zona-cronometro {
    position: absolute;
    top: 20px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-cronometro .caja {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-cronometro .caja img { width: 1000px; height: auto; }
#lbl-tiempo {
    position: absolute;
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 225px;
    color: #fff;
    text-align: center;
    line-height: 1;
}

/* --- PARTE --- */
#zona-parte {
    position: absolute;
    top: 290px;
    left: 800px; right: 800px;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-parte .caja {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-parte .caja img { width: 400px; height: auto; }
#lbl-parte {
    position: absolute;
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 41px;
    color: #fff;
    text-align: center;
    transform: scaleX(1.1);
    white-space: nowrap;
}

/* --- ESCUDOS (con transición para desplazamiento por decena) --- */
#escudo-local {
    position: absolute;
    left: 184px;
    top: 383px;
    width: 400px;
    height: 400px;
    object-fit: contain;
    transition: transform 0.3s ease;
}
#escudo-visitante {
    position: absolute;
    left: 1354px;
    top: 399px;
    width: 400px;
    height: 400px;
    object-fit: contain;
    transition: transform 0.3s ease;
}
#lienzo.decena #escudo-local { transform: translateX(-150px); }
#lienzo.decena #escudo-visitante { transform: translateX(150px); }

/* --- MARCADOR CENTRAL --- */
#zona-marcador {
    position: absolute;
    left: 200px; right: 200px;
    top: 380px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}
.gol-numero, .gol-separador {
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 400px;
    color: #fff;
    line-height: 1;
    transition: color 0.3s;
}

/* --- GOLEADORES (con clip y scroll) --- */
#zona-goleadores-local {
    position: absolute;
    bottom: 50px;
    left: 67px;
}
#zona-goleadores-visitante {
    position: absolute;
    bottom: 50px;
    right: 67px;
}

.caja-goleadores {
    position: relative;
    overflow: hidden;
}
.caja-goleadores img.fondo-caja {
    display: block;
}
#zona-goleadores-local .caja-goleadores { width: 650px; height: 213px; }
#zona-goleadores-local .caja-goleadores img { width: 650px; height: 213px; }
#zona-goleadores-visitante .caja-goleadores { width: 630px; height: 220px; }
#zona-goleadores-visitante .caja-goleadores img { width: 630px; height: 220px; }

.goleadores-clip {
    position: absolute;
    top: 25px; bottom: 32px;
    overflow: hidden;
}
#zona-goleadores-local .goleadores-clip { left: 50px; right: 120px; }
#zona-goleadores-visitante .goleadores-clip { left: 50px; right: 15px; }

.goleadores-contenido {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
}
.goleadores-contenido .goleador {
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 30px;
    color: #fff;
    white-space: nowrap;
    line-height: 1.4;
}
#zona-goleadores-local .goleador { text-align: right; }
#zona-goleadores-visitante .goleador { text-align: left; }

/* --- VIDEO OVERLAY --- */
#capa-video {
    position: absolute;
    top: 0; left: 0;
    width: 1920px; height: 1080px;
    display: none; opacity: 0;
    z-index: 100;
    background: #000;
}
#capa-video video { width: 100%; height: 100%; object-fit: cover; }

/* --- INDICADOR CONEXIÓN --- */
#indicador-conexion {
    position: fixed; bottom: 10px; left: 10px; z-index: 200;
    display: flex; align-items: center; gap: 6px;
    font-family: system-ui, sans-serif; font-size: 11px; color: #aaa;
    opacity: 0; transition: opacity 0.3s;
}
body:hover #indicador-conexion { opacity: 1; }
#indicador-conexion .punto { width: 8px; height: 8px; border-radius: 50%; background: #e53935; flex-shrink: 0; }
#indicador-conexion.conectado .punto { background: #4caf50; }

/* --- BOTÓN FULLSCREEN --- */
#btn-fullscreen {
    position: fixed; bottom: 10px; right: 10px; z-index: 200;
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px; color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
}
#btn-fullscreen:hover { background: rgba(255,255,255,0.3); }
body:hover #btn-fullscreen { opacity: 1; }
</style>
</head>
<body>

<!-- Fondo: capa separada, cover sin deformación -->
<div id="fondo-cover"></div>

<!-- Lienzo UI: escala uniforme -->
<div id="lienzo">
    <div id="zona-cronometro">
        <div class="caja">
            <img src="assets/images/caja_cronometro.png" alt="">
            <span id="lbl-tiempo">00:00</span>
        </div>
    </div>
    <div id="zona-parte">
        <div class="caja">
            <img src="assets/images/caja_parte.png" alt="">
            <span id="lbl-parte">1ª PARTE</span>
        </div>
    </div>
    <img id="escudo-local" src="assets/images/escudo_local.png" alt="">
    <img id="escudo-visitante" src="assets/images/escudo_visitante.png" alt="">
    <div id="zona-marcador">
        <span id="lbl-goles-local" class="gol-numero">0</span>
        <span class="gol-separador">-</span>
        <span id="lbl-goles-visitante" class="gol-numero">0</span>
    </div>
    <div id="zona-goleadores-local">
        <div class="caja-goleadores">
            <img class="fondo-caja" src="assets/images/caja_goleador_local.png" alt="">
            <div class="goleadores-clip">
                <div id="lista-goleadores-local" class="goleadores-contenido"></div>
            </div>
        </div>
    </div>
    <div id="zona-goleadores-visitante">
        <div class="caja-goleadores">
            <img class="fondo-caja" src="assets/images/caja_goleador_visitante.png" alt="">
            <div class="goleadores-clip">
                <div id="lista-goleadores-visitante" class="goleadores-contenido"></div>
            </div>
        </div>
    </div>
    <div id="capa-video">
        <video id="video-gol" playsinline></video>
    </div>
</div>

<div id="indicador-conexion">
    <span class="punto"></span>
    <span class="texto">Conectando...</span>
</div>
<button id="btn-fullscreen" title="Pantalla completa (F)">&#x26F6;</button>

<script type="module">
import { onEstadoActualizado, leerEstado, onComandoCrono, onConexionCambiada, solicitarEstado } from './sync.js';

const SEPARADOR = '       ';
const PANTALLA_KEY = 'marcador-pantalla-config';

const fondoCover = document.getElementById('fondo-cover');
const lienzo = document.getElementById('lienzo');
const lblTiempo = document.getElementById('lbl-tiempo');
const lblParte = document.getElementById('lbl-parte');
const lblGolesLocal = document.getElementById('lbl-goles-local');
const lblGolesVisitante = document.getElementById('lbl-goles-visitante');
const listaLocal = document.getElementById('lista-goleadores-local');
const listaVisitante = document.getElementById('lista-goleadores-visitante');
const capaVideo = document.getElementById('capa-video');
const videoEl = document.getElementById('video-gol');

let ultimoVideoTs = 0;
let pantallaConfig = null;

try {
    const guardada = localStorage.getItem(PANTALLA_KEY);
    if (guardada) pantallaConfig = JSON.parse(guardada);
} catch (e) {}

// ============================================================
//  CRONÓMETRO LOCAL
// ============================================================
let comandoCrono = null;
let displayInterval = null;

function calcularSegundos() {
    if (!comandoCrono) return 0;
    if (comandoCrono.accion === 'arrancar') {
        const elapsed = (Date.now() - comandoCrono.tsReferencia) / 1000;
        const c = comandoCrono.config;
        if (c.esAscendente) return Math.min(Math.floor(comandoCrono.segundosEnPausa + elapsed), c.limiteMinutos * 60);
        else return Math.max(Math.floor(comandoCrono.segundosEnPausa - elapsed), 0);
    }
    return comandoCrono.segundosEnPausa || 0;
}

function formatoTiempo(segs) {
    const m = Math.floor(segs / 60);
    const s = segs % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function refrescarReloj() {
    lblTiempo.textContent = formatoTiempo(calcularSegundos());
}

function aplicarComandoCrono(cmd) {
    if (!cmd) return;
    comandoCrono = cmd;
    if (displayInterval) { clearInterval(displayInterval); displayInterval = null; }
    refrescarReloj();
    if (cmd.config) lblParte.textContent = (cmd.config.parteActual || 1) + 'ª PARTE';
    if (cmd.accion === 'arrancar') displayInterval = setInterval(refrescarReloj, 1000);
}

onComandoCrono(aplicarComandoCrono);

// ============================================================
//  ESCALADO: fondo cover + UI escala uniforme
// ============================================================
function actualizarEscala() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    let areaX = 0, areaY = 0, areaW = vw, areaH = vh;
    if (pantallaConfig && (pantallaConfig.ancho > 0 || pantallaConfig.alto > 0)) {
        areaX = pantallaConfig.offsetX || 0;
        areaY = pantallaConfig.offsetY || 0;
        if (pantallaConfig.ancho > 0) areaW = pantallaConfig.ancho;
        if (pantallaConfig.alto > 0) areaH = pantallaConfig.alto;
    }

    fondoCover.style.left = areaX + 'px';
    fondoCover.style.top = areaY + 'px';
    fondoCover.style.width = areaW + 'px';
    fondoCover.style.height = areaH + 'px';

    const factor = Math.min(areaW / 1920, areaH / 1080);
    const scaledW = 1920 * factor;
    const scaledH = 1080 * factor;
    lienzo.style.transform = `scale(${factor})`;
    lienzo.style.left = (areaX + (areaW - scaledW) / 2) + 'px';
    lienzo.style.top = (areaY + (areaH - scaledH) / 2) + 'px';
}

window.addEventListener('resize', actualizarEscala);
document.addEventListener('fullscreenchange', actualizarEscala);
actualizarEscala();

// ============================================================
//  PANTALLA COMPLETA
// ============================================================
function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen().catch(() => {});
}
document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);
document.addEventListener('keydown', (e) => {
    if ((e.key === 'f' || e.key === 'F') && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') toggleFullscreen();
});

// ============================================================
//  ESCUDOS: desplazar cuando marcador >= 10
// ============================================================
function actualizarEscudos(golesL, golesV) {
    if (golesL >= 10 || golesV >= 10) lienzo.classList.add('decena');
    else lienzo.classList.remove('decena');
}

// ============================================================
//  GOLEADORES: auto-scroll continuo
// ============================================================
const scrollAnims = {};

function gestionarScrollGoleadores(clipEl, listaEl, id) {
    if (scrollAnims[id]) {
        cancelAnimationFrame(scrollAnims[id].raf);
        clearTimeout(scrollAnims[id].timer);
        delete scrollAnims[id];
    }
    listaEl.style.transform = 'translateY(0)';

    requestAnimationFrame(() => { requestAnimationFrame(() => {
        const clipH = clipEl.clientHeight;
        const listaH = listaEl.scrollHeight;
        console.log(`[scroll ${id}] clipH=${clipH} listaH=${listaH} overflow=${listaH - clipH}`);
        if (listaH <= clipH) return;

        const overflow = listaH - clipH;
        const speed = 30;
        const pausa = 8000;
        const st = { y: 0, dir: 1, raf: 0, timer: 0, last: 0 };
        scrollAnims[id] = st;

        function tick(now) {
            if (!st.last) st.last = now;
            const dt = (now - st.last) / 1000;
            st.last = now;

            st.y += speed * dt * st.dir;

            if (st.dir === 1 && st.y >= overflow) {
                st.y = overflow;
                listaEl.style.transform = `translateY(${-st.y}px)`;
                st.dir = -1;
                st.last = 0;
                st.timer = setTimeout(() => { st.raf = requestAnimationFrame(tick); }, pausa);
                return;
            }
            if (st.dir === -1 && st.y <= 0) {
                st.y = 0;
                listaEl.style.transform = 'translateY(0)';
                st.dir = 1;
                st.last = 0;
                st.timer = setTimeout(() => { st.raf = requestAnimationFrame(tick); }, pausa);
                return;
            }

            listaEl.style.transform = `translateY(${-st.y}px)`;
            st.raf = requestAnimationFrame(tick);
        }

        st.timer = setTimeout(() => { st.raf = requestAnimationFrame(tick); }, pausa);
    }); });
}

// ============================================================
//  RENDERIZADO
// ============================================================
function renderizar(estado) {
    if (!estado) return;

    const golesL = estado.golesLocal ?? 0;
    const golesV = estado.golesVisitante ?? 0;
    lblGolesLocal.textContent = golesL;
    lblGolesVisitante.textContent = golesV;
    if (estado.parte) lblParte.textContent = estado.parte;

    actualizarEscudos(golesL, golesV);

    renderizarGoleadores(listaLocal, estado.goleadoresLocal || [], 'local');
    renderizarGoleadores(listaVisitante, estado.goleadoresVisitante || [], 'visitante');

    const color = estado.colorMarcador || 'white';
    document.querySelectorAll('.gol-numero, .gol-separador').forEach(el => el.style.color = color);

    if (estado.videoEvento && estado.videoEvento.ts > ultimoVideoTs) {
        ultimoVideoTs = estado.videoEvento.ts;
        if (estado.videoEvento.url) reproducirVideo(estado.videoEvento.url);
        else detenerVideo();
    }

    if (estado.pantalla) {
        pantallaConfig = estado.pantalla;
        localStorage.setItem(PANTALLA_KEY, JSON.stringify(pantallaConfig));
        actualizarEscala();
    }

    if (estado.comandoCrono) aplicarComandoCrono(estado.comandoCrono);

    precargarVideos(estado.videosPrecargar);
}

function renderizarGoleadores(contenedor, lista, lado) {
    contenedor.innerHTML = '';
    lista.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'goleador';
        const minutos = entry.minutos.join(' ');
        div.textContent = lado === 'local'
            ? entry.nombre + SEPARADOR + minutos
            : minutos + SEPARADOR + entry.nombre;
        contenedor.appendChild(div);
    });

    const clipEl = contenedor.parentElement;
    gestionarScrollGoleadores(clipEl, contenedor, lado);
}

// ============================================================
//  VÍDEO
// ============================================================
let fadeTimeout = null;

function reproducirVideo(url) {
    if (fadeTimeout) { clearTimeout(fadeTimeout); fadeTimeout = null; }
    videoEl.src = url;
    capaVideo.style.display = 'block';
    capaVideo.style.opacity = '0';
    capaVideo.style.transition = 'opacity 0.5s ease';
    videoEl.load();
    videoEl.play().then(() => { capaVideo.style.opacity = '1'; }).catch(() => { capaVideo.style.display = 'none'; });
    videoEl.onended = () => {
        capaVideo.style.transition = 'opacity 0.8s ease';
        capaVideo.style.opacity = '0';
        fadeTimeout = setTimeout(() => { capaVideo.style.display = 'none'; videoEl.src = ''; }, 800);
    };
}

function detenerVideo() {
    if (fadeTimeout) { clearTimeout(fadeTimeout); fadeTimeout = null; }
    videoEl.pause(); videoEl.src = '';
    capaVideo.style.transition = 'none'; capaVideo.style.opacity = '0'; capaVideo.style.display = 'none';
}

// ============================================================
//  PRECARGA DE VÍDEOS
// ============================================================
const videosPrecargados = new Set();
function precargarVideos(urls) {
    if (!urls) return;
    urls.forEach(url => {
        if (videosPrecargados.has(url)) return;
        videosPrecargados.add(url);
        const el = document.createElement('video');
        el.preload = 'auto'; el.muted = true; el.src = url; el.load();
    });
}

// ============================================================
//  INDICADOR DE CONEXIÓN
// ============================================================
const indicador = document.getElementById('indicador-conexion');
const indicadorTexto = indicador.querySelector('.texto');
onConexionCambiada((st) => {
    if (st === 'connected') {
        indicador.classList.add('conectado');
        indicadorTexto.textContent = 'Conectado';
        solicitarEstado();
    } else {
        indicador.classList.remove('conectado');
        indicadorTexto.textContent = ({ connecting:'Conectando...', disconnected:'Desconectado', suspended:'Suspendido', closed:'Cerrado', failed:'Error' })[st] || st;
    }
});

// ============================================================
//  INICIO
// ============================================================
const estadoInicial = leerEstado();
if (estadoInicial) renderizar(estadoInicial);

onEstadoActualizado(renderizar);
</script>
</body>
</html>
