<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcador Público</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    background: #000;
    overflow: hidden;
    width: 100%;
    height: 100%;
}

#lienzo {
    width: 1920px;
    height: 1080px;
    position: absolute;
    transform-origin: 0 0;
    overflow: hidden;
}

#fondo {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 1080px;
    object-fit: cover;
}

/* --- CRONÓMETRO --- */
#zona-cronometro {
    position: absolute;
    top: 20px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-cronometro .caja {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-cronometro .caja img {
    width: 1000px;
    height: auto;
}
#lbl-tiempo {
    position: absolute;
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 225px;
    color: #fff;
    text-align: center;
    line-height: 1;
}

/* --- PARTE --- */
#zona-parte {
    position: absolute;
    top: 290px;
    left: 800px;
    right: 800px;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-parte .caja {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-parte .caja img {
    width: 400px;
    height: auto;
}
#lbl-parte {
    position: absolute;
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 41px;
    color: #fff;
    text-align: center;
    transform: scaleX(1.1);
    white-space: nowrap;
}

/* --- ESCUDOS --- */
#escudo-local {
    position: absolute;
    left: 184px;
    top: 383px;
    width: 400px;
    height: 400px;
    object-fit: contain;
}
#escudo-visitante {
    position: absolute;
    left: 1354px;
    top: 399px;
    width: 400px;
    height: 400px;
    object-fit: contain;
}

/* --- MARCADOR CENTRAL --- */
#zona-marcador {
    position: absolute;
    left: 200px;
    right: 200px;
    top: 380px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}
.gol-numero, .gol-separador {
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 400px;
    color: #000;
    line-height: 1;
}

/* --- GOLEADORES LOCAL --- */
#zona-goleadores-local {
    position: absolute;
    bottom: 50px;
    left: 67px;
}
#zona-goleadores-local .caja {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-goleadores-local .caja img {
    width: 650px;
    height: auto;
}
#lista-goleadores-local {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 25px 100px 15px 50px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
}
#lista-goleadores-local .goleador {
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 30px;
    color: #fff;
    text-align: right;
    white-space: nowrap;
    line-height: 1.4;
}

/* --- GOLEADORES VISITANTE --- */
#zona-goleadores-visitante {
    position: absolute;
    bottom: 50px;
    right: 67px;
}
#zona-goleadores-visitante .caja {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}
#zona-goleadores-visitante .caja img {
    width: 630px;
    height: auto;
}
#lista-goleadores-visitante {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 15px 15px 15px 50px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
}
#lista-goleadores-visitante .goleador {
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: bold;
    font-size: 30px;
    color: #fff;
    text-align: left;
    white-space: nowrap;
    line-height: 1.4;
}

/* --- VIDEO OVERLAY --- */
#capa-video {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 1080px;
    display: none;
    opacity: 0;
    z-index: 100;
    background: #000;
}
#capa-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* --- INDICADOR CONEXIÓN --- */
#indicador-conexion {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: system-ui, sans-serif;
    font-size: 11px;
    color: #aaa;
    opacity: 0;
    transition: opacity 0.3s;
}
body:hover #indicador-conexion { opacity: 1; }
#indicador-conexion .punto {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #e53935;
    flex-shrink: 0;
}
#indicador-conexion.conectado .punto { background: #4caf50; }

/* --- BOTÓN FULLSCREEN --- */
#btn-fullscreen {
    position: fixed;
    bottom: 10px;
    right: 10px;
    z-index: 200;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
}
#btn-fullscreen:hover { background: rgba(255,255,255,0.3); }
body:hover #btn-fullscreen { opacity: 1; }
</style>
</head>
<body>

<div id="lienzo">
    <img id="fondo" src="assets/images/fondo.png" alt="">

    <!-- Cronómetro -->
    <div id="zona-cronometro">
        <div class="caja">
            <img src="assets/images/caja_cronometro.png" alt="">
            <span id="lbl-tiempo">00:00</span>
        </div>
    </div>

    <!-- Parte -->
    <div id="zona-parte">
        <div class="caja">
            <img src="assets/images/caja_parte.png" alt="">
            <span id="lbl-parte">1ª PARTE</span>
        </div>
    </div>

    <!-- Escudos -->
    <img id="escudo-local" src="assets/images/escudo_local.png" alt="">
    <img id="escudo-visitante" src="assets/images/escudo_visitante.png" alt="">

    <!-- Marcador central -->
    <div id="zona-marcador">
        <span id="lbl-goles-local" class="gol-numero">0</span>
        <span class="gol-separador">-</span>
        <span id="lbl-goles-visitante" class="gol-numero">0</span>
    </div>

    <!-- Goleadores Local -->
    <div id="zona-goleadores-local">
        <div class="caja">
            <img src="assets/images/caja_goleador_local.png" alt="">
            <div id="lista-goleadores-local"></div>
        </div>
    </div>

    <!-- Goleadores Visitante -->
    <div id="zona-goleadores-visitante">
        <div class="caja">
            <img src="assets/images/caja_goleador_visitante.png" alt="">
            <div id="lista-goleadores-visitante"></div>
        </div>
    </div>

    <!-- Capa de vídeo -->
    <div id="capa-video">
        <video id="video-gol" playsinline></video>
    </div>
</div>

<div id="indicador-conexion">
    <span class="punto"></span>
    <span class="texto">Conectando...</span>
</div>
<button id="btn-fullscreen" title="Pantalla completa (F)">&#x26F6;</button>

<script type="module">
import { onEstadoActualizado, leerEstado, onConexionCambiada, solicitarEstado } from './sync.js';

const SEPARADOR = '       ';
const PANTALLA_KEY = 'marcador-pantalla-config';

const lienzo = document.getElementById('lienzo');
const lblTiempo = document.getElementById('lbl-tiempo');
const lblParte = document.getElementById('lbl-parte');
const lblGolesLocal = document.getElementById('lbl-goles-local');
const lblGolesVisitante = document.getElementById('lbl-goles-visitante');
const listaLocal = document.getElementById('lista-goleadores-local');
const listaVisitante = document.getElementById('lista-goleadores-visitante');
const capaVideo = document.getElementById('capa-video');
const videoEl = document.getElementById('video-gol');

let ultimoVideoTs = 0;
let pantallaConfig = null;

// --- ZONA SEGURA: cargar config persistida ---
try {
    const guardada = localStorage.getItem(PANTALLA_KEY);
    if (guardada) pantallaConfig = JSON.parse(guardada);
} catch (e) {}

// ============================================================
//  ESCALADO RESPONSIVO
// ============================================================
function actualizarEscala() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const tieneConfig = pantallaConfig && (pantallaConfig.ancho > 0 || pantallaConfig.alto > 0);

    if (tieneConfig) {
        const areaX = pantallaConfig.offsetX || 0;
        const areaY = pantallaConfig.offsetY || 0;
        const areaW = pantallaConfig.ancho > 0 ? pantallaConfig.ancho : vw;
        const areaH = pantallaConfig.alto > 0 ? pantallaConfig.alto : vh;
        const scaleX = areaW / 1920;
        const scaleY = areaH / 1080;

        lienzo.style.transform = `scale(${scaleX}, ${scaleY})`;
        lienzo.style.left = areaX + 'px';
        lienzo.style.top = areaY + 'px';
    } else {
        const factor = Math.min(vw / 1920, vh / 1080);
        const scaledW = 1920 * factor;
        const scaledH = 1080 * factor;

        lienzo.style.transform = `scale(${factor})`;
        lienzo.style.left = ((vw - scaledW) / 2) + 'px';
        lienzo.style.top = ((vh - scaledH) / 2) + 'px';
    }
}

window.addEventListener('resize', actualizarEscala);
document.addEventListener('fullscreenchange', actualizarEscala);
actualizarEscala();

// ============================================================
//  PANTALLA COMPLETA
// ============================================================
function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
}

document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);
document.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F') {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        toggleFullscreen();
    }
});

// ============================================================
//  RENDERIZADO
// ============================================================
function renderizar(estado) {
    if (!estado) return;

    lblTiempo.textContent = estado.tiempo || '00:00';
    lblParte.textContent = estado.parte || '1ª PARTE';
    lblGolesLocal.textContent = estado.golesLocal ?? 0;
    lblGolesVisitante.textContent = estado.golesVisitante ?? 0;

    renderizarGoleadores(listaLocal, estado.goleadoresLocal || [], 'local');
    renderizarGoleadores(listaVisitante, estado.goleadoresVisitante || [], 'visitante');

    // Video
    if (estado.videoEvento && estado.videoEvento.ts > ultimoVideoTs) {
        ultimoVideoTs = estado.videoEvento.ts;
        if (estado.videoEvento.url) {
            reproducirVideo(estado.videoEvento.url);
        } else {
            detenerVideo();
        }
    }

    // Zona segura sincronizada desde panel
    if (estado.pantalla) {
        pantallaConfig = estado.pantalla;
        localStorage.setItem(PANTALLA_KEY, JSON.stringify(pantallaConfig));
        actualizarEscala();
    }

    // Precarga de vídeos de celebración
    precargarVideos(estado.videosPrecargar);
}

function renderizarGoleadores(contenedor, lista, lado) {
    contenedor.innerHTML = '';
    lista.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'goleador';
        const minutos = entry.minutos.join(' ');
        if (lado === 'local') {
            div.textContent = entry.nombre + SEPARADOR + minutos;
        } else {
            div.textContent = minutos + SEPARADOR + entry.nombre;
        }
        contenedor.appendChild(div);
    });
}

// ============================================================
//  VÍDEO
// ============================================================
let fadeTimeout = null;

function reproducirVideo(url) {
    if (fadeTimeout) { clearTimeout(fadeTimeout); fadeTimeout = null; }

    videoEl.src = url;
    capaVideo.style.display = 'block';
    capaVideo.style.opacity = '0';
    capaVideo.style.transition = 'opacity 0.5s ease';

    videoEl.load();
    videoEl.play().then(() => {
        capaVideo.style.opacity = '1';
    }).catch(() => {
        capaVideo.style.display = 'none';
    });

    videoEl.onended = () => {
        capaVideo.style.transition = 'opacity 0.8s ease';
        capaVideo.style.opacity = '0';
        fadeTimeout = setTimeout(() => {
            capaVideo.style.display = 'none';
            videoEl.src = '';
        }, 800);
    };
}

function detenerVideo() {
    if (fadeTimeout) { clearTimeout(fadeTimeout); fadeTimeout = null; }
    videoEl.pause();
    videoEl.src = '';
    capaVideo.style.transition = 'none';
    capaVideo.style.opacity = '0';
    capaVideo.style.display = 'none';
}

// ============================================================
//  PRECARGA DE VÍDEOS
// ============================================================
const videosPrecargados = new Set();

function precargarVideos(urls) {
    if (!urls) return;
    urls.forEach(url => {
        if (videosPrecargados.has(url)) return;
        videosPrecargados.add(url);
        const el = document.createElement('video');
        el.preload = 'auto';
        el.muted = true;
        el.src = url;
        el.load();
    });
}

// ============================================================
//  INDICADOR DE CONEXIÓN
// ============================================================
const indicador = document.getElementById('indicador-conexion');
const indicadorTexto = indicador.querySelector('.texto');

onConexionCambiada((estado) => {
    if (estado === 'connected') {
        indicador.classList.add('conectado');
        indicadorTexto.textContent = 'Conectado';
        solicitarEstado();
    } else {
        indicador.classList.remove('conectado');
        const textos = {
            connecting: 'Conectando...',
            disconnected: 'Desconectado',
            suspended: 'Suspendido',
            closed: 'Cerrado',
            failed: 'Error'
        };
        indicadorTexto.textContent = textos[estado] || estado;
    }
});

// ============================================================
//  INICIO
// ============================================================
const estadoInicial = leerEstado();
if (estadoInicial) renderizar(estadoInicial);

onEstadoActualizado(renderizar);
</script>
</body>
</html>
